<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生物地图 - 记录自然之美</title>
  <!-- 高德地图JS API（Web端Key） -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=0aa9b501ff5aebd37cdefcee74d23130&plugin=AMap.InfoWindow,AMap.ToolBar"></script>
  <!-- 七牛云SDK -->
  <script src="https://unpkg.com/qiniu-js@3.4.2/dist/qiniu.min.js"></script>
  <!-- CryptoJS（生成七牛上传凭证） -->
  <script src="https://cdn.bootcdn.net/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <!-- 字体样式 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- 自定义样式 -->
  <link rel="stylesheet" href="style.css">
  <style>
    .map-container {
      width: 100%;
      height: 100%;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="main-container" id="mainContainer">
    <header class="header">
      <h2 class="header-title">生物地图 <span class="subtitle">植物&动物记录平台</span></h2>
    </header>
    <div class="app-container">
      <div class="upload-panel">
        <h3 class="panel-title">📝 上传生物信息</h3>
        <div class="input-group">
          <label for="bioType">生物类型</label>
          <select id="bioType" class="form-control">
            <option value="plant">植物</option>
            <option value="animal">动物</option>
          </select>
        </div>
        <div class="input-group">
          <label for="bioName">生物名称</label>
          <input type="text" id="bioName" class="form-control" placeholder="如：大熊猫、樟树、银杏">
        </div>
        <div class="input-group">
          <label for="address">位置名称</label>
          <input type="text" id="address" class="form-control" placeholder="如：成都市锦江区望江楼公园">
        </div>
        <div class="input-group">
          <label for="bioDesc">生物介绍</label>
          <textarea id="bioDesc" class="form-control" placeholder="如：国家一级保护动物，主食竹子，栖息于四川卧龙..."></textarea>
        </div>
        <div class="input-group">
          <label for="fileInput">生物图片</label>
          <input type="file" id="fileInput" accept="image/png,image/jpg,image/jpeg">
        </div>
        <button class="btn primary-btn" onclick="uploadBioInfo()">上传并标记</button>
      </div>
      <div id="mapContainer" class="map-container"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
